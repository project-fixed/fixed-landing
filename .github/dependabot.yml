version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      production-deps:
        dependency-type: "production"
        patterns: ["*"]
      development-deps:
        dependency-type: "development"
        patterns: ["*"]
